# SFT Training Config for Hearsay Transcription Correction
# Target: Qwen3-0.6B with LoRA on Modal (A100 or T4)
#
# Usage:
#   modal run train_modal.py        # run on Modal
#   modal run train_modal.py --dry-run  # preview config

model:
  base: "Qwen/Qwen3-0.6B"
  output: "outputs/sft"


dataset:
  name: "data/train/"
  text_field: "text"
  split: "train"
  eval_split: 0.1

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  max_length: 512
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  save_steps: 100
  eval_steps: 50
  save_total_limit: 3

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

tracking:
  project: "hearsay-transcription-correction"
  run_name: "sft-qwen3-0.6b"
