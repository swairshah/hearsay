name: Hearsay
options:
  bundleIdPrefix: com.swair
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

packages:
  LLM.swift:
    url: https://github.com/obra/LLM.swift.git
    branch: main
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"

targets:
  Hearsay:
    type: application
    platform: macOS
    sources:
      - Hearsay
    settings:
      base:
        INFOPLIST_FILE: Hearsay/Info.plist
        CODE_SIGN_ENTITLEMENTS: Hearsay/Hearsay.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.swair.hearsay
        PRODUCT_NAME: Hearsay
        SWIFT_VERSION: "5"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: false
        ARCHS: "arm64 x86_64"
        ONLY_ACTIVE_ARCH: false
        SWIFT_ENABLE_MACROS: YES
    dependencies:
      - package: LLM.swift
        product: LLM
      - package: WhisperKit

  HearsayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HearsayTests
    dependencies:
      - target: Hearsay
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hearsay.app/Contents/MacOS/Hearsay"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
