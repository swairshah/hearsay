name: Hearsay
options:
  bundleIdPrefix: com.swair
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

packages:
  LLM.swift:
    url: https://github.com/obra/LLM.swift.git
    branch: main
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main

targets:
  Hearsay:
    type: application
    platform: macOS
    sources:
      - Hearsay
    settings:
      base:
        INFOPLIST_FILE: Hearsay/Info.plist
        CODE_SIGN_ENTITLEMENTS: Hearsay/Hearsay.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.swair.hearsay
        PRODUCT_NAME: Hearsay
        SWIFT_VERSION: "5"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: false
        ARCHS: "arm64 x86_64"
        ONLY_ACTIVE_ARCH: false
        SWIFT_ENABLE_MACROS: YES
    dependencies:
      - package: LLM.swift
        product: LLM
      - package: WhisperKit
    postBuildScripts:
      - name: Copy Parakeet Helper
        script: |
          HELPER_SRC="${BUILT_PRODUCTS_DIR}/HearsayParakeetHelper"
          HELPER_DST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/MacOS/HearsayParakeetHelper"
          if [ -f "$HELPER_SRC" ]; then
            mkdir -p "$(dirname "$HELPER_DST")"
            cp "$HELPER_SRC" "$HELPER_DST"
            chmod 755 "$HELPER_DST"
          fi

  HearsayParakeetHelper:
    type: tool
    platform: macOS
    sources:
      - HearsayParakeetHelper
    settings:
      base:
        PRODUCT_NAME: HearsayParakeetHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.swair.hearsay.parakeet-helper
        SWIFT_VERSION: "5"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ARCHS: "arm64"
        ONLY_ACTIVE_ARCH: false
    dependencies:
      - package: FluidAudio
        product: FluidAudio

  HearsayCLI:
    type: tool
    platform: macOS
    sources:
      - HearsayCLI
    settings:
      base:
        PRODUCT_NAME: hearsay
        PRODUCT_BUNDLE_IDENTIFIER: com.swair.hearsay.cli
        SWIFT_VERSION: "5"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ARCHS: "arm64 x86_64"
        ONLY_ACTIVE_ARCH: false

  HearsayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HearsayTests
    dependencies:
      - target: Hearsay
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hearsay.app/Contents/MacOS/Hearsay"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
